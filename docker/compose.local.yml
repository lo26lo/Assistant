# =============================================================================
#  compose.local.yml — override pour le workflow local (ecran branche au Jetson)
#
#  Active les devices necessaires au rendu GUI sur l'ecran local :
#    - /dev/dri        : acceleration GPU display (OpenGL via DRM/KMS)
#    - /dev/input      : clavier, souris, ecran tactile
#    - /dev/snd        : audio (optionnel)
#
#  La camera (/dev/video0) et le bus USB restent commentes ici car ils
#  dependent du materiel branche. Decommenter manuellement quand la cam et
#  la RealSense seront prets.
#
#  Usage (deja gere par scripts/run_local_gui.sh) :
#    docker compose -f docker/compose.yml -f docker/compose.local.yml up -d dev
# =============================================================================

# NOTE merge compose : les listes (group_add, devices, volumes) d'un override
# sont CONCATENEES a celles de compose.yml, pas remplacees. Ne declarer ici
# QUE ce qui n'est pas deja dans compose.yml, sinon doublons (erreur #14).
# compose.yml fournit deja group_add: video, plugdev (+ dialout pour dev).

services:
  dev:
    # NB: /dev/dri est desormais monte par defaut dans compose.yml (toujours
    # present sur un Jetson demarre). NE PAS le re-declarer ici — les listes
    # devices sont CONCATENEES par le merge compose → doublon (erreur #14).
    devices:
      - /dev/input:/dev/input       # clavier, souris, touch screen
      # Cameras USB (/dev/video*) : NE PAS les mapper en dur ici — un device
      # declare mais absent empeche le container de demarrer (erreurs #6/#15).
      # run_local_gui.sh genere un override automatique avec les /dev/video*
      # reellement presents au lancement.
      # - /dev/bus/usb:/dev/bus/usb # decommenter pour USB hot-plug (RealSense)
      # - /dev/snd:/dev/snd         # decommenter si besoin audio
    group_add:
      - input

  runtime:
    # /dev/dri monte par defaut dans compose.yml — ne pas re-declarer (doublon #14).
    devices:
      - /dev/input:/dev/input
      # Cameras : voir note ci-dessus (override dynamique, pas de mapping en dur)
      # - /dev/bus/usb:/dev/bus/usb
    group_add:
      - input
