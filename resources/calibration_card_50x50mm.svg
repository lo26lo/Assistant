<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="50mm" height="50mm"
     viewBox="0 0 50 50">
  <title>Calibration Card 7×5 inner corners — 5mm squares — 50×50mm</title>
  <desc>Print at 100% scale (no fit-to-page). Board: 8 cols × 6 rows of 5mm squares = 40×30mm, centered on 50×50mm card.</desc>

  <!-- White background (card) -->
  <rect x="0" y="0" width="50" height="50" fill="white" stroke="#ccc" stroke-width="0.2"/>

  <!-- Thin border to help cut -->
  <rect x="0.5" y="0.5" width="49" height="49" fill="none" stroke="#aaa" stroke-width="0.1" stroke-dasharray="1,1"/>

  <!-- Checkerboard: 8 cols × 6 rows, 5mm squares, offset to center (5mm, 10mm) -->
  <!-- Row 0 (y=10) -->
  <rect x="5"  y="10" width="5" height="5" fill="black"/>
  <rect x="15" y="10" width="5" height="5" fill="black"/>
  <rect x="25" y="10" width="5" height="5" fill="black"/>
  <rect x="35" y="10" width="5" height="5" fill="black"/>

  <!-- Row 1 (y=15) -->
  <rect x="10" y="15" width="5" height="5" fill="black"/>
  <rect x="20" y="15" width="5" height="5" fill="black"/>
  <rect x="30" y="15" width="5" height="5" fill="black"/>
  <rect x="40" y="15" width="5" height="5" fill="black"/>

  <!-- Row 2 (y=20) -->
  <rect x="5"  y="20" width="5" height="5" fill="black"/>
  <rect x="15" y="20" width="5" height="5" fill="black"/>
  <rect x="25" y="20" width="5" height="5" fill="black"/>
  <rect x="35" y="20" width="5" height="5" fill="black"/>

  <!-- Row 3 (y=25) -->
  <rect x="10" y="25" width="5" height="5" fill="black"/>
  <rect x="20" y="25" width="5" height="5" fill="black"/>
  <rect x="30" y="25" width="5" height="5" fill="black"/>
  <rect x="40" y="25" width="5" height="5" fill="black"/>

  <!-- Row 4 (y=30) -->
  <rect x="5"  y="30" width="5" height="5" fill="black"/>
  <rect x="15" y="30" width="5" height="5" fill="black"/>
  <rect x="25" y="30" width="5" height="5" fill="black"/>
  <rect x="35" y="30" width="5" height="5" fill="black"/>

  <!-- Row 5 (y=35) -->
  <rect x="10" y="35" width="5" height="5" fill="black"/>
  <rect x="20" y="35" width="5" height="5" fill="black"/>
  <rect x="30" y="35" width="5" height="5" fill="black"/>
  <rect x="40" y="35" width="5" height="5" fill="black"/>

  <!-- Label -->
  <text x="25" y="8" text-anchor="middle" font-family="Arial" font-size="2" fill="#666">7×5 inner corners — 5mm squares</text>
  <text x="25" y="44" text-anchor="middle" font-family="Arial" font-size="1.5" fill="#999">MicroscopeIBOM calibration — print at 100%</text>

  <!-- Corner marks for cutting -->
  <line x1="0" y1="2" x2="0" y2="0" stroke="#666" stroke-width="0.15"/>
  <line x1="0" y1="0" x2="2" y2="0" stroke="#666" stroke-width="0.15"/>
  <line x1="48" y1="0" x2="50" y2="0" stroke="#666" stroke-width="0.15"/>
  <line x1="50" y1="0" x2="50" y2="2" stroke="#666" stroke-width="0.15"/>
  <line x1="50" y1="48" x2="50" y2="50" stroke="#666" stroke-width="0.15"/>
  <line x1="50" y1="50" x2="48" y2="50" stroke="#666" stroke-width="0.15"/>
  <line x1="2" y1="50" x2="0" y2="50" stroke="#666" stroke-width="0.15"/>
  <line x1="0" y1="50" x2="0" y2="48" stroke="#666" stroke-width="0.15"/>
</svg>
